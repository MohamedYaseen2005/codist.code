                      <style>
                          body {
                            font-family: 'Inter', sans-serif;
                          }
                  
                          /* Styling for the report bug link */
                          .report-bug {
                              color: blue;
                              cursor: pointer;
                              text-decoration: underline;
                              font-size: 16px;
                          }
                  
                          /* Chatbox popup */
                          .chat-popup {
                              display: none;
                              position: absolute;
                              top: 180px;
                              left:160px;
                              width: 300px;
                              background: white;
                              border: 1px solid #ccc;
                              border-radius: 10px;
                              box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
                              padding: 15px;
                              z-index: 1000;
                              animation: fadeIn 0.3s ease-in-out;
                          }
                  
                          /* Chatbox header */
                          .chat-header {
                              font-size: 18px;
                              font-weight: bold;
                              margin-bottom: 10px;
                          }
                  
                          /* Chatbox text area */
                          .chat-textarea {
                              width: 100%;
                              height: 80px;
                              border: 1px solid #ddd;
                              border-radius: 5px;
                              padding: 5px;
                              resize: none;
                          }
                  
                          /* Send button */
                          .send-btn {
                              width: 100%;
                              background: rgb(58, 134, 204); 
                              color: white;
                              padding: 8px;
                              border: none;
                              border-radius: 5px;
                              cursor: pointer;
                              margin-top: 10px;
                          }
                  
                          .send-btn:hover {
                            background-color: #ffffff;
                            color:  rgb(58, 134, 204);  
                          }
                  
                          /* Fade in animation */
                          @keyframes fadeIn {
                              from { opacity: 0; transform: translateY(-10px); }
                              to { opacity: 1; transform: translateY(0); }
                          }
                      </style>
                  </head>
                  <body>
                  
                      <p><a class="report-bug" style="margin-left: 5%; font-family: 'Inter', sans-serif;font-size: large; margin-top: -2%;color: #666">Report Bug</a></p>
                  
                      <div class="chat-popup" id="chatPopup">
                          <div class="chat-header">Bug Report</div>
                          <textarea class="chat-textarea" id="bugReport" placeholder="Describe the issue..."></textarea>
                          <button class="send-btn" id="sendReport">Send</button>
                      </div>
                  
                      <script>
                          const reportBugLink = document.querySelector('.report-bug');
                          const chatPopup = document.getElementById('chatPopup');
                          const sendButton = document.getElementById('sendReport');
                          const bugReportTextarea = document.getElementById('bugReport');
                  
                          // Show popup when clicking the link
                          reportBugLink.addEventListener('click', (event) => {
                              event.stopPropagation();
                              chatPopup.style.display = 'block';
                          });
                  
                          // Close popup when clicking outside
                          document.addEventListener('click', (event) => {
                              if (!chatPopup.contains(event.target) && event.target !== reportBugLink) {
                                  chatPopup.style.display = 'none';
                              }
                          });
                  
                          // Prevent popup from closing when clicking inside
                          chatPopup.addEventListener('click', (event) => {
                              event.stopPropagation();
                          });
                  
                          // Send report and redirect to admin4.html
                          sendButton.addEventListener('click', () => {
                              const bugText = bugReportTextarea.value.trim();
                              if (bugText) {
                                  let bugReports = JSON.parse(localStorage.getItem('bugReports')) || [];
                                  bugReports.push(bugText);
                                  localStorage.setItem('bugReports', JSON.stringify(bugReports)); // Save all reports
                                  window.location.href = 'home page.html'; // Redirect to Admin Panel
                              } else {
                                  alert('Please enter a bug report before sending.');
                              }
                          });
                      </script>
                  
                  </body>

<script>
    function toggleDropdown(event) {
        event.stopPropagation();
        document.getElementById('profileDropdown').classList.toggle('show');
    }

    function toggleSettings(event) {
        event.stopPropagation();
        document.getElementById('settingsDropdown').classList.toggle('show');
    }

    function showPopup(event) {
        event.stopPropagation();
        document.getElementById('popup').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function hidePopup() {
        document.getElementById('popup').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function logout() {
        window.location.href = 'login.html';
    }

    document.addEventListener('click', function(event) {
        if (!document.querySelector('.profile').contains(event.target)) {
            document.getElementById('profileDropdown').classList.remove('show');
            document.getElementById('settingsDropdown').classList.remove('show');
        }
    });
    function goBack() {
        window.history.back();
    }
    
    // Function to open new page
    function openPage(url) {
        window.location.href = url;
    }
    
    // Dark Mode Toggle
    const darkModeToggle = document.getElementById("darkModeToggle");
    darkModeToggle.addEventListener("change", () => {
        document.body.classList.toggle("dark-mode");
        localStorage.setItem("darkMode", document.body.classList.contains("dark-mode"));
    });
    
    // Preserve Dark Mode on Reload
    window.onload = () => {
        if (localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark-mode");
            darkModeToggle.checked = true;
        }
    };
</script>

/* Navbar Styling */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: rgb(58, 134, 204); /* Blue background */
    padding: 10px 20px;
    color: white;
}

/* Logo Section */
.logo-section {
    display: flex;
    align-items: center;
}

.logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 8px;
}

.brand-name {
    font-size: 18px;
    top: -16%;
    font-weight: solid;
    font-size:xx-large; font-family:'Times New Roman', Times, serif;
}

/* Desktop Navigation Links */
.nav-links {
    display: flex;
    align-items: center;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-right: 15px;
    font-size: 16px;
}

/* Login Button */
.login-btn {
    background-color: white;
    color: black;
    border: none;
    padding: 5px 10px;
    font-size: 14px;
    border-radius: 5px;
    margin-right: 10px;
    cursor: pointer;
}

/* Toggle Circle */
.toggle-circle {
    width: 20px;
    height: 20px;
    background-color: white;
    border-radius: 50%;
}

/* Mobile Menu Button */
.menu-icon {
    display: none;
    font-size: 24px;
    cursor: pointer;
}

/* Mobile Menu (Hidden by Default) */
.mobile-menu {
    display: none;
    flex-direction: column;
    background-color: rgb(58, 134, 204);
    position: absolute;
    top: 60px;
    right: 0;
    width: 100%;
    text-align: center;
    padding: 10px;
}

.mobile-menu a, .mobile-menu button {
    padding: 10px;
    text-decoration: none;
    color: white;
    border: none;
    background: none;
    font-size: 18px;
    width: 100%;
}

.mobile-menu button {
    background-color: white;
    color: black;
    border-radius: 5px;
}

/* Responsive Design */
@media screen and (max-width: 768px) {
    .nav-links {
        display: none; /* Hide Desktop Menu */
    }

    .menu-icon {
        display: block; /* Show Mobile Menu Button */
    }
   
    .user-pic{
        margin-left: -10%;
    }
}
</style>
<script>
    function toggleMenu() {
    const mobileMenu = document.querySelector(".mobile-menu");
    mobileMenu.style.display = mobileMenu.style.display === "flex" ? "none" : "flex";
}
</script>
