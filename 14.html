

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif; 
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            color: white;
            padding: 8px;
        }
        .left-section, .right-section {
            display: flex;
            align-items: center;
            gap: 10px;
            
        }
        .hint-boxes {
            display: flex;
            flex-direction: column;
            padding: 10px;
            width: 20%;
        }
        .hint {
            background: #ddd;
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Inter', sans-serif;
        }
        .hint-content {
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            display: none;
        }
        .container {
            display: flex;
            flex: 1;
        }
        .editor {
            flex: 1;
            padding: 10px;
        }
        textarea {
            width: 100%;
            height: 430%;
            font-family: 'Inter', sans-serif; 
            font-size: 16px;
        }
        .output {
            width: 30%;
            padding: 50px;
            background: #f4f4f4;
            border-left: 1px solid #ccc;
            margin-top: 1%;
        }
        button {
            cursor: pointer;
            padding: 5px 10px;
        }
        .runbtn{
            padding: 10px 15px;
  margin-top: 3%;
  font-size: 1rem;
  cursor: pointer;
  border: none;
  background-color:  rgb(58, 134, 204);
  color:white;
  margin-left: 0%;
  border-radius: 15px;
  transition: background-color 0.3s ease;
  box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
 
        }
        .runbtn:hover{
            background-color: #ffffff;
            color:  rgb(58, 134, 204);
        }
        .saveBtn{
            padding: 10px 15px;
  margin-top: 3%;
  font-size: 1rem;
  cursor: pointer;
  border: none;
  background-color:  rgb(58, 134, 204);
  color: #fff;
  margin-left: 0%;
  border-radius: 15px;
  transition: background-color 0.3s ease;
  box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);  
        }
        .saveBtn:hover{
            background-color: #ffffff;
            color:  rgb(58, 134, 204);   
        }
        .sharebtn{
            padding: 10px 15px;
  margin-top: 3%;
  font-size: 1rem;
  cursor: pointer;
  border: none;
  background-color:  rgb(58, 134, 204);
  color: #fff;
  margin-left: 0%;
  border-radius: 15px;
  transition: background-color 0.3s ease;
  box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3); 
        }
        .sharebtn:hover{
            background-color: #ffffff;
            color:  rgb(58, 134, 204);  
        }
        .we {
    background: rgb(58, 134, 204);
    color: white;
    border: none;
    padding: 10px 13px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 5px;
        }

.we:hover {
    background-color: #ffffff;
            color:  rgb(58, 134, 204);  
        }
        .yesbtn{
            background: rgb(58, 134, 204);
    color: white;
    border: none;
    padding: 10px 13px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 13px;
    
        }
        .yesbtn:hover{
            background-color: #ffffff;
            color:  rgb(58, 134, 204);

        }
        .nobtn{
            background: rgb(58, 134, 204);
    color: white;
    border: none;
    padding: 10px 13px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 13px;

        }
        .nobtn:hover{
            background-color: #ffffff;
            color:  rgb(58, 134, 204);

        }
       
        
    </style>
</head>
<body>
    <div class="header">
        <div class="left-section">
            <select id="language" class="we">
                <option value="c">C</option>
                <option value="cpp">C++</option>
                <option value="python">Python</option>
            </select>
            
        </div>
        <h4 style="margin-right:20%;font-family: 'Inter', sans-serif; ">Do you want the sample code?</h4>
        <button class="yesbtn" style="margin-left:-48%">Yes</button>
        <button class="nobtn"  style="margin-left:-27%">No</button>
        <div class="right-section">
            <button class="runbtn"  id="run-btn">Run</button>
            <button class="saveBtn">Save</button>
            
                <style>
                   
            
                    .share-button {
                       
                        padding: 10px 15px;
  margin-top: 3%;
  font-size: 1rem;
  cursor: pointer;
  border: none;
  background-color:  rgb(58, 134, 204);
  color: #fff;
  margin-left: 0%;
  border-radius: 15px;
  transition: background-color 0.3s ease;
  box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3); 
                    }
            
                    .share-button:hover {
                        background-color: #ffffff;
                        color:  rgb(58, 134, 204);  
                    }
            
                    .share-icon {
                        margin-right: 8px;
                        width: 18px;
                        height: 18px;
                       
                    }
                    .share-icon:hover {
                        background-color: #ffffff;
                        color:  rgb(58, 134, 204);  
                    }
                </style>
            </head>
            <body>
            
                <button class="share-button" onclick="shareContent()">
                    <svg class="share-icon" viewBox="0 0 24 24">
                        <path d="M18 16.08c-.76 0-1.47.3-2 .77L8.91 12.7c.05-.23.09-.47.09-.7s-.03-.47-.09-.7l7-4.11c.55.49 1.26.79 2 .79 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .23.04.47.09.7l-7 4.11c-.55-.49-1.26-.79-2-.79-1.66 0-3 1.34-3 3s1.34 3 3 3c.74 0 1.45-.3 2-.77l7.09 4.15c-.05.21-.09.45-.09.68 0 1.66 1.34 3 3 3s3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                    Share
                </button>
            
                <script>
                    function shareContent() {
                        if (navigator.share) {
                            navigator.share({
                                title: "Check this out!",
                                text: "I found something interesting!",
                                url: window.location.href
                            }).then(() => console.log('Shared successfully'))
                            .catch((error) => console.log('Error sharing:', error));
                        } else {
                            alert("Sharing not supported on this browser.");
                        }
                    }
                </script>
            
            </body>
            </html>
            
        </div>
    </div>
    <div class="container">
        <div class="hint-boxes">
            <div class="hint" onclick="showHint('Logic: Use proper syntax!')">Logic</div>
            <div class="hint" onclick="showHint('Recipe: Use console.log for debugging.')">Recipe</div>
            <div class="hint" onclick="showHint('Ingredients: Functions help organize code.')">Ingredients</div>
            <div id="hint-content" class="hint-content"></div>
        </div>
        <div class="editor">
            <textarea id="code-area" readonly>
                #include <stdio.h>
                
                int main() {
                    printf("Hello, World!");
                    return 0;
                }
                </textarea>
                
                
                
        </div>
        <div class="output" id="output-box">
            <p>Hello, World!</p>
        </div>
        
    </div>
   
    <script>
        function showHint(message) {
            const hintContent = document.getElementById("hint-content");
            hintContent.innerText = message;
            hintContent.style.display = "block";
        }

        document.getElementById("run-btn").addEventListener("click", function() {
            const code = document.getElementById("code-area").value;
            try {
                const result = eval(code);
                document.getElementById("output-box").innerHTML = `<p>${result}</p>`;
            } catch (error) {
                document.getElementById("output-box").innerHTML = `<p style='color:red;'>Error: ${error}</p>`;
            }
        });
    </script>
</body>
</html>
