    <h2 style="margin-left:5% ; font-family: 'Inter', sans-serif;">Collected Achievements</h2>
    <div id="awarded-container">
        <p style=" font-family: 'Inter', sans-serif;">No achievements yet.</p>
    </div>
    
 



<script>
 function awardBadge(name, button) {
            let container = document.getElementById("awarded-container");

            // Check if the achievement already exists
            if (document.getElementById(name)) {
                alert(name + " is already collected!");
                return;
            }

            // Create new badge
            let badge = document.createElement("div");
            badge.id = name;
            badge.style.display = "inline-block";
            badge.style.margin = "10px";
            badge.innerHTML = `
                <img src="${button.parentElement.querySelector("img").src}" width="60" height="60">
                <p>${name}</p>
            `;

            // Remove default text if adding the first achievement
            if (container.textContent.includes("No achievements yet.")) {
                container.innerHTML = "";
            }

            // Append the new badge
            container.appendChild(badge);
        }

// Helper function to get award images


</script>
