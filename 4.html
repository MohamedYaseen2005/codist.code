.circular-progress{
    position: relative;
    height: 250px;
    width: 250px;
    border-radius: 100%;
    background: conic-gradient( rgb(58, 134, 204) 3.6deg, #ededed 0deg);
    display: flex;
    align-items: center;
    justify-content: center;
margin-left: 15%;

}
.circular-progress::before{
    content: "";
    position: absolute;
    height: 210px;
    width: 210px;
    border-radius: 100%;
    background-color: #fff;
    padding-left: 9px;
  
}
.progress-value{
    position: relative;
    font-size: 40px;
    font-weight: 600;
    color:  rgb(58, 134, 204); 
    
}
</style>
<script>
let circularProgressElements = document.querySelectorAll(".circular-progress");

circularProgressElements.forEach((circularProgress) => {
    let progressValue = circularProgress.querySelector(".progress-value");

    let progressStartValue = 0,
        progressEndValue = 100,  // Set to 100% progress
        speed = 10;

    let progress = setInterval(() => {
        progressStartValue++;

        progressValue.textContent = `${progressStartValue}%`;  // Fix template literal
        circularProgress.style.background = `conic-gradient(rgb(58, 134, 204) ${progressStartValue * 3.6}deg, #ededed 0deg)`;

        if (progressStartValue === progressEndValue) {
            clearInterval(progress);
        }
    }, speed);
});

    </script>
