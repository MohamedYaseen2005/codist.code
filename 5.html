        <div id="timer" style="  margin-left: 42.5%;font-weight: bolder;font-size: x-large;  color:  #ff0000;">Loading...</div>
    
        <script>
            // Set the target date (YYYY, MM-1, DD, HH, MM, SS)
            let targetDate = new Date("2025-12-31T23:59:59").getTime();
    
            function updateTimer() {
                let now = new Date().getTime();
                let timeLeft = targetDate - now;
    
                if (timeLeft > 0) {
                    let days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                    let hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    let minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                    let seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
    
                    document.getElementById("timer").textContent = 
                        `${days}d ${hours}h ${minutes}m ${seconds}s`;
                } else {
                    document.getElementById("timer").textContent = "Time's Up!";
                    clearInterval(timerInterval);
                }
            }
    
            // Update timer every second
            let timerInterval = setInterval(updateTimer, 1000);
    
            updateTimer(); // Initial call to display immediately
        </script>
    
    </body>

.circular-progress{
    position: relative;
    height: 250px;
    width: 250px;
    border-radius: 100%;
    background: conic-gradient( rgb(58, 134, 204) 3.6deg, #ededed 0deg);
    display: flex;
    align-items: center;
    justify-content: center;
margin-left: 10%;

}
.circular-progress::before{
    content: "";
    position: absolute;
    height: 210px;
    width: 210px;
    border-radius: 100%;
    background-color: #fff;
    padding-left: 9px;
  
}
.progress-value{
    position: relative;
    font-size: 40px;
    font-weight: 600;
    color:  rgb(58, 134, 204); 
    
}
</style>
<script>
let circularProgressElements = document.querySelectorAll(".circular-progress");

circularProgressElements.forEach((circularProgress) => {
    let progressValue = circularProgress.querySelector(".progress-value");

    let progressStartValue = 0,
        progressEndValue = 70,  // Set to 100% progress
        speed = 10;

    let progress = setInterval(() => {
        progressStartValue++;

        progressValue.textContent = `${progressStartValue}%`;  // Fix template literal
        circularProgress.style.background = `conic-gradient(rgb(58, 134, 204) ${progressStartValue * 3.6}deg, #ededed 0deg)`;

        if (progressStartValue === progressEndValue) {
            clearInterval(progress);
        }
    }, speed);
});

    </script>
