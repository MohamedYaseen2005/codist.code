<style>
    body {
    margin: 0;
    font-family: 'Inter', sans-serif;
}

/* Navbar Styling */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: rgb(58, 134, 204); /* Blue background */
    padding: 10px 20px;
    color: white;
}

/* Logo Section */
.logo-section {
    display: flex;
    align-items: center;
}

.logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 8px;
}

.brand-name {
    font-size: 18px;
    top: -16%;
    font-weight: solid;
    color: #ffffff;
              background-color:  rgb(58, 134, 204);
              border: #f4f4f4;
    font-size:xx-large; font-family:'Times New Roman', Times, serif;
}

/* Desktop Navigation Links */
.nav-links {
    display: flex;
    align-items: center;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-right: 15px;
    font-size: 16px;
}

/* Login Button */
.login-btn {
    background-color: white;
    color: black;
    border: none;
    padding: 5px 10px;
    font-size: 14px;
    border-radius: 5px;
    margin-right: 10px;
    cursor: pointer;
}

/* Toggle Circle */
.toggle-circle {
    width: 20px;
    height: 20px;
    background-color: white;
    border-radius: 50%;
}

/* Mobile Menu Button */
.menu-icon {
    display: none;
    font-size: 24px;
    cursor: pointer;
}

/* Mobile Menu (Hidden by Default) */
.mobile-menu {
    display: none;
    flex-direction: column;
    background-color: rgb(58, 134, 204);
    position: absolute;
    top: 60px;
    right: 0;
    width: 100%;
    text-align: center;
    padding: 10px;
}

.mobile-menu a, .mobile-menu button {
    padding: 10px;
    text-decoration: none;
    color: white;
    border: none;
    background: none;
    font-size: 18px;
    width: 100%;
}

.mobile-menu button {
    background-color: white;
    color: black;
    border-radius: 5px;
}

/* Responsive Design */
@media screen and (max-width: 768px) {
    .nav-links {
        display: none; /* Hide Desktop Menu */
    }

    .menu-icon {
        display: block; /* Show Mobile Menu Button */
    }
   
    .user-pic{
        margin-left: -20%;
    }
}
</style>
<script>
    function toggleMenu() {
    const mobileMenu = document.querySelector(".mobile-menu");
    mobileMenu.style.display = mobileMenu.style.display === "flex" ? "none" : "flex";
}
</script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

    

        h2 {
            text-align: center;
        }

        .bug-list {
            list-style: none;
            padding: 0;
        }

        .bug-item {
            background: #f8f8f8;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            width: 18%;
            text-align: center;
            padding: 10px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #0056b3;
        }

        .clear-btn {
            background: #dc3545;
            margin-left: 40%;
            
        }

        .clear-btn:hover {
            background: #a71d2a;
        }
    </style>
</head>
<body>

    <div class="container">
        <center>
            <h2 style="font-family:  'Inter', sans-serif;  font-size: xx-large; color:  rgb(11, 76, 22);;">Bug reports</h2>
           </center>
        <ul class="bug-list" id="bugReportList">
            <li>No bug reports found.</li>
        </ul>
<br>
<br>
        <div class="btn-container">
           
            <button class="btn clear-btn" id="clearReports">Clear Reports</button>
        </div>
    </div>

    <script>
        const bugReportList = document.getElementById('bugReportList');
        const clearReportsBtn = document.getElementById('clearReports');

        // Retrieve bug reports from localStorage
        let bugReports = JSON.parse(localStorage.getItem('bugReports')) || [];

        function displayReports() {
            bugReportList.innerHTML = ''; // Clear list before adding new items
            if (bugReports.length === 0) {
                bugReportList.innerHTML = '<li>No bug reports found.</li>';
            } else {
                bugReports.forEach((report, index) => {
                    const li = document.createElement('li');
                    li.classList.add('bug-item');
                    li.textContent = `#${index + 1}: ${report}`;
                    bugReportList.appendChild(li);
                });
            }
        }

        // Display reports on page load
        displayReports();

        // Clear all reports when clicking "Clear Reports"
        clearReportsBtn.addEventListener('click', () => {
            localStorage.removeItem('bugReports'); // Remove stored reports
            bugReports = []; // Clear array
            displayReports(); // Refresh UI
        });
    </script>

</body>
</html>
