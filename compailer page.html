<style>
    body {
    margin: 0;
    font-family: 'Inter', sans-serif;
}

/* Navbar Styling */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: rgb(58, 134, 204); /* Blue background */
    padding: 10px 20px;
    color: white;
}

/* Logo Section */
.logo-section {
    display: flex;
    align-items: center;
}

.logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 8px;
}

.brand-name {
    font-size: 18px;
    top: -16%;
    font-weight: solid;
    color: #ffffff;
              background-color:  rgb(58, 134, 204);
              border: #f4f4f4;
    font-size:xx-large; font-family:'Times New Roman', Times, serif;
}

/* Desktop Navigation Links */
.nav-links {
    display: flex;
    align-items: center;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-right: 15px;
    font-size: 16px;
}

/* Login Button */
.login-btn {
    background-color: white;
    color: black;
    border: none;
    padding: 5px 10px;
    font-size: 14px;
    border-radius: 5px;
    margin-right: 10px;
    cursor: pointer;
}

/* Toggle Circle */
.toggle-circle {
    width: 20px;
    height: 20px;
    background-color: white;
    border-radius: 50%;
}

/* Mobile Menu Button */
.menu-icon {
    display: none;
    font-size: 24px;
    cursor: pointer;
}

/* Mobile Menu (Hidden by Default) */
.mobile-menu {
    display: none;
    flex-direction: column;
    background-color: rgb(58, 134, 204);
    position: absolute;
    top: 60px;
    right: 0;
    width: 100%;
    text-align: center;
    padding: 10px;
}

.mobile-menu a, .mobile-menu button {
    padding: 10px;
    text-decoration: none;
    color: white;
    border: none;
    background: none;
    font-size: 18px;
    width: 100%;
}

.mobile-menu button {
    background-color: white;
    color: black;
    border-radius: 5px;
}

/* Responsive Design */
@media screen and (max-width: 768px) {
    .nav-links {
        display: none; /* Hide Desktop Menu */
    }

    .menu-icon {
        display: block; /* Show Mobile Menu Button */
    }
   
    .user-pic{
        margin-left: -20%;
    }
}
</style>
<script>
    function toggleMenu() {
    const mobileMenu = document.querySelector(".mobile-menu");
    mobileMenu.style.display = mobileMenu.style.display === "flex" ? "none" : "flex";
}
</script>

    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Popup</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
      
        .popup-container {
             display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); 
            }
        .popup { position: absolute; top: 50%; left: 50%; width: 35%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.3); }
        .progress-container { width: 100%; background: #ddd; border-radius: 5px; margin: 20px 0; }
        .progress-bar { height: 20px; width: 0%; background:  rgb(58, 134, 204); border-radius: 5px; }
        .next-btn { background: gray; color: white; padding: 10px 15px; border: none; cursor: not-allowed; border-radius: 5px; }
        .next-btn.active { background:  rgb(58, 134, 204); cursor: pointer; }
       
    </style>
</head>
<body>
    <button class="yesbtn" onclick="openPopup()" style="margin-left: 70%; margin-top: 2%;  ">Check</button>
    <div class="popup-container" id="popup-container" onclick="closePopup(event)">
        <div class="popup" onclick="event.stopPropagation()">
            <h2>Complete Inputs</h2>
            <div>
                <input type="text" id="input1" value="6" readonly style="width: 80%;"> <button onclick="checkAnswer(1)" class="yesbtn" style="margin-left: 5%;">Try</button>
            </div>
            <br>
            <div>
                <input type="text" id="input2" value="45" readonly  style="width: 80%;"> <button onclick="checkAnswer(2)" class="yesbtn" style="margin-left: 5%;">Try</button>
            </div>
            <br>
            <div>
                <input type="text" id="input3" value="265" readonly  style="width: 80%;"> <button onclick="checkAnswer(3)" class="yesbtn" style="margin-left: 5%;">Try</button>
            </div>
            <br>
            <div>
                <input type="text" id="input4" value="1902" readonly  style="width: 80%;"> <button onclick="checkAnswer(4)" class="yesbtn" style="margin-left: 5%;">Try</button>
            </div>
            <br>
            <div>
                <input type="text" id="input5" value="39267" readonly  style="width: 80%;"> <button onclick="checkAnswer(5)" class="yesbtn"style="margin-left: 5%;">Try</button>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
           <a href="23.html"><button class="yesbtn" id="next-btn" disabled>Next</button></a> 
        </div>
    </div>
    <script>
        let progress = 0;
        let completed = {};

        function openPopup() {
            document.getElementById("popup-container").style.display = "block";
        }
        
        function closePopup(event) {
            document.getElementById("popup-container").style.display = "none";
        }
        
        function checkAnswer(num) {
            if (!completed[num]) {
                completed[num] = true;
                progress += 20;
                document.getElementById("progress-bar").style.width = progress + "%";
                checkCompletion();
            }
        }

        function checkCompletion() {
            let nextBtn = document.getElementById("next-btn");
            if (progress === 100) {
                nextBtn.classList.add("active");
                nextBtn.removeAttribute("disabled");
            }
        }
    </script>
</body>
</html>

    <script>
        function showHint(message) {
            const hintContent = document.getElementById("hint-content");
            hintContent.innerText = message;
            hintContent.style.display = "block";
        }

        document.getElementById("run-btn").addEventListener("click", function() {
            const code = document.getElementById("code-area").value;
            try {
                const result = eval(code);
                document.getElementById("output-box").innerHTML = `<p>${result}</p>`;
            } catch (error) {
                document.getElementById("output-box").innerHTML = `<p style='color:red;'>Error: ${error}</p>`;
            }
        });
    </script>
