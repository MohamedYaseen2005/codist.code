<style>
    body {
    margin: 0;

}

/* Navbar Styling */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: rgb(58, 134, 204); /* Blue background */
    padding: 10px 20px;
    color: white;
}

/* Logo Section */
.logo-section {
    display: flex;
    align-items: center;
}

.logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 8px;
}

.brand-name {
    font-size: 18px;
    top: -16%;
    font-weight: solid;
    color: #ffffff;
              background-color:  rgb(58, 134, 204);
              border: #f4f4f4;
    font-size:xx-large; font-family:'Times New Roman', Times, serif;
}

/* Desktop Navigation Links */
.nav-links {
    display: flex;
    align-items: center;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-right: 15px;
    font-size: 16px;
}

/* Login Button */
.login-btn {
    background-color: white;
    color: black;
    border: none;
    padding: 5px 10px;
    font-size: 14px;
    border-radius: 5px;
    margin-right: 10px;
    cursor: pointer;
}

/* Toggle Circle */
.toggle-circle {
    width: 20px;
    height: 20px;
    background-color: white;
    border-radius: 50%;
}

/* Mobile Menu Button */
.menu-icon {
    display: none;
    font-size: 24px;
    cursor: pointer;
}

/* Mobile Menu (Hidden by Default) */
.mobile-menu {
    display: none;
    flex-direction: column;
    background-color: rgb(58, 134, 204);
    position: absolute;
    top: 60px;
    right: 0;
    width: 100%;
    text-align: center;
    padding: 10px;
}

.mobile-menu a, .mobile-menu button {
    padding: 10px;
    text-decoration: none;
    color: white;
    border: none;
    background: none;
    font-size: 18px;
    width: 100%;
}

.mobile-menu button {
    background-color: white;
    color: black;
    border-radius: 5px;
}

/* Responsive Design */
@media screen and (max-width: 768px) {
    .nav-links {
        display: none; /* Hide Desktop Menu */
    }

    .menu-icon {
        display: block; /* Show Mobile Menu Button */
    }
   
    .user-pic{
        margin-left: -20%;
    }
}
</style>
<script>
    function toggleMenu() {
    const mobileMenu = document.querySelector(".mobile-menu");
    mobileMenu.style.display = mobileMenu.style.display === "flex" ? "none" : "flex";
}
</script>

    <h2 style="  margin-left: 44%; font-size:larger;">Countdown Timer</h2>
    <div id="timer1" style="  margin-left: 43%; ">Loading...</div>

    <script>
        // Set the target date (YYYY, MM-1, DD, HH, MM, SS)
        let targetDate = new Date("2025-12-31T23:59:59").getTime();

        function updateTimer() {
            let now = new Date().getTime();
            let timeLeft = targetDate - now;

            if (timeLeft > 0) {
                let days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                let hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                let seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

                document.getElementById("timer1").textContent = 
                    `${days}d ${hours}h ${minutes}m ${seconds}s`;
            } else {
                document.getElementById("timer1").textContent = "Time's Up!";
                clearInterval(timerInterval);
            }
        }

        // Update timer every second
        let timerInterval = setInterval(updateTimer, 1000);

        updateTimer(); // Initial call to display immediately
    </script>

</body>

.circular-progress{
    position: relative;
    height: 250px;
    width: 250px;
    border-radius: 100%;
    background: conic-gradient( rgb(58, 134, 204) 3.6deg, #ededed 0deg);
    display: flex;
    align-items: center;
    justify-content: center;
margin-left: 10%;

}
.circular-progress::before{
    content: "";
    position: absolute;
    height: 210px;
    width: 210px;
    border-radius: 100%;
    background-color: #fff;
    padding-left: 9px;
  
}
.progress-value{
    position: relative;
    font-size: 40px;
    font-weight: 600;
    color:  rgb(58, 134, 204); 
    
}
</style>
<script>
let circularProgressElements = document.querySelectorAll(".circular-progress");

circularProgressElements.forEach((circularProgress) => {
    let progressValue = circularProgress.querySelector(".progress-value");

    let progressStartValue = 0,
        progressEndValue = 1,  // Set to 100% progress
        speed = 10;

    let progress = setInterval(() => {
        progressStartValue++;

        progressValue.textContent = `${progressStartValue}%`;  // Fix template literal
        circularProgress.style.background = `conic-gradient(rgb(58, 134, 204) ${progressStartValue * 3.6}deg, #ededed 0deg)`;

        if (progressStartValue === progressEndValue) {
            clearInterval(progress);
        }
    }, speed);
});
document.addEventListener("DOMContentLoaded", function () {
    let circularProgressElements = document.querySelectorAll(".circular-progress");

    circularProgressElements.forEach((circularProgress) => {
        let progressValue = circularProgress.querySelector(".progress-value");

        let progressStartValue = 0,
            progressEndValue = Math.floor(Math.random() * 100) + 1, // Random progress for demonstration
            speed = 30;

        let progress = setInterval(() => {
            progressStartValue++;

            progressValue.textContent = `${progressStartValue}%`;
            circularProgress.style.background = `conic-gradient(rgb(58, 134, 204) ${progressStartValue * 3.6}deg, #ededed 0deg)`;

            if (progressStartValue === progressEndValue) {
                clearInterval(progress);
            }
        }, speed);
    });
});

    </script>
