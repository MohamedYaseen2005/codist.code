<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Bundle Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        table {
            width: 90%;
            max-width: 800px;
            margin: auto;
            border-collapse: collapse;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }

        th, td {
            border: 1px solid #666;
            padding: 10px;
            text-align: center;
            white-space: nowrap;
        }

        th {
            background-color: rgb(58, 134, 204);
            font-family: 'Inter', sans-serif;
            color: white;
        }

        .edit-btn, .remove-btn {
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .edit-btn {
            background-color: orange;
            color: white;
        }
        .edit-btn:hover {
            background-color: darkorange;
        }

        .remove-btn {
            background-color: red;
            color: white;
            margin-left: 5px;
        }
        .remove-btn:hover {
            background-color: darkred;
        }

        @media screen and (max-width: 768px) {
            table {
                width: 110%;
                font-size: 14px;
            }

            th, td {
                padding: 4px;
            }

            .edit-btn, .remove-btn {
                padding: 6px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <center>
        <h2 style="font-family: 'Inter', sans-serif; font-size: xx-large; color: rgb(11, 76, 22);">Edit Management</h2>
    </center>

    <table>
        <thead>
            <tr>
                <th>BUNDLE NAME</th>
                <th>BUNDLE PRICE</th>
                <th>NO OF PROGRAMS</th>
                <th>ACTIONS</th>
            </tr>
        </thead>
        <tbody id="bundleTable"></tbody>
    </table>

    <script>
        function loadBundles() {
            let bundles = JSON.parse(localStorage.getItem("bundles")) || [];
            let table = document.getElementById("bundleTable");
            table.innerHTML = "";

            bundles.forEach((bundle, index) => {
                let row = `<tr>
                    <td>${bundle.name}</td>
                    <td>${bundle.price}</td>
                    <td>${bundle.programs}</td>
                    <td>
                        <button class="edit-btn" onclick="editBundle(${index})">Edit</button>
                        <button class="remove-btn" onclick="removeBundle(${index})">Remove</button>
                    </td>
                </tr>`;
                table.innerHTML += row;
            });
        }

        function editBundle(index) {
            window.location.href = `admin2.html?index=${index}`;
        }

        function removeBundle(index) {
            let bundles = JSON.parse(localStorage.getItem("bundles")) || [];
            if (confirm("Are you sure you want to delete this bundle?")) {
                bundles.splice(index, 1);
                localStorage.setItem("bundles", JSON.stringify(bundles));
                loadBundles();
            }
        }

        window.onload = loadBundles;
    </script>
</body>
</html>
