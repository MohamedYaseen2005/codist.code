<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <style>
        
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: white;
        }
        .otp-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.397);
            text-align: center;
            width: 300px;
        }
        .otp-container h2 {
            margin-bottom: 20px;
            font-size: 22px;
            color: #333;
            
        }
        .otp-inputs {
            display: flex;
            justify-content: space-evenly;
            margin-bottom: 20px;
            
        }
        .otp-inputs input {
            width: 35px;
            height: 35px;
            text-align: center;
            font-size: 20px;
            border: 2px solid #ccc;
            border-radius: 5px;
            outline: none;
           
        }
        .otp-inputs input:hover {
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
        }

        
        .otp-inputs input:focus {
            border-color: #00b4d8;;
        }
        .otp-button {
            background-color: white;;;
            color: #00b4d8;
            padding: 10px 20px;
            border: 1px solid #00b4d8 ;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
        }
        .otp-button:hover {
            background-color: #00b4d8;
         color: white;
           box-shadow: 0px 4px 15px rgb(1, 215, 253)
        }
        
        
        .resend-link {
            margin-top: 20px;
            font-size: 14px;
        }
        .resend-link a {
            color:  #00b4d8;
            text-decoration: none;
    
        }
        .resend-link a:hover {
            text-decoration: underline;
        }
        
  



       
    </style>
</head>
<body>
    <center>
    <div>
        <h1 STYLE="color:#00b4d8">CODIST</h1>
    

    <div class="otp-container">
        <h2 style="color: #00b4d8;font-size: 24px;">Enter OTP</h2>
        <p style="color:  #8d99ae;; font-size: 15px;" >Please enter the 4-digit code sent to your phone.</p>
        
        <div class="otp-inputs">
            <!-- OTP Input Fields -->
            <input type="text"  oninput="validateOTP(event)" maxlength="1" id="otp1">
            <input type="text" oninput="validateOTP(event)"maxlength="1" id="otp2">
            <input type="text" oninput="validateOTP(event)" maxlength="1" id="otp3">
            <input type="text" oninput="validateOTP(event)"maxlength="1" id="otp4">
            
        </div>

        <button class="otp-button"  onclick="location. href='PASSWORD.html'">Verify OTP</button>

        <div class="resend-link">
        
            <p style="color: #8d99ae"></p>Didn't receive the otp? <a href="">Resend otp</a></p>
            
        </div>
    </div>

    <script>
        // Optional JavaScript functionality for OTP Input Behavior

        // Automatically focus next input when a digit is entered
        const otpInputs = document.querySelectorAll('.otp-inputs input');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', function () {
                if (this.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });
        });

        // Submit OTP (simple demonstration)
        function submitOTP() {
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            if (otp.length === 6) {
                alert(OTP Entered: ${otp});
            } else {
                alert('Please enter a valid 6-digit OTP');
            }
        }
        function validateOTP(event) {
      const otpInput = event.target;
      // Replace anything that's not a digit
      otpInput.value = otpInput.value.replace(/[^0-9]/g, '');

      // Optionally, if you want to stop typing after a certain length:
      if (otpInput.value.length === 6) {
        // If you want to trigger submission or focus on the next input field
        console.log('OTP is valid:', otpInput.value);
      }
    }
        
    </script>

</body>
</html>
<style>
   .resend-link {
    font-family: Arial, sans-serif;
  display: block;
  margin-top: 15px;
  font-size: 14px;
  color:  #8d99ae;
  text-decoration: none;
}
</style>
