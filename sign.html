<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="login-wrapper">
    <div>
      <h1 STYLE="color:#00b4d8">CODIST</h1>
    </div>
    <br>
    
    <div class="login-box">
      <h2>SIGN UP</h2>
      <form>
        <div class="input-field">
        <input type="text" placeholder="Name">
        </div>
        <div class="input-field">
           
            <input type="text" id="phone" name="phone" onkeypress="validatePhoneNumber(event)" placeholder="Phone Number">
        </div>
        <div class="input-field">
          <input type="password" placeholder="Password" required>
         
        </div>
        
        <button type="submit" class="SIGNUP-btn" onclick="location. href='LOGIN.html'"> SIGN UP</button>
        
        
        
      </form>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
<style>
    /* Reset styles */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background-color: #fafafa;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.login-wrapper {
  position: relative;
  width: 400px;
  text-align: center;
}


  




.login-box {
  position: relative;
  z-index: 1;
  background-color: #ffffff;
  padding: 20px 30px;
  border-radius: 15px;
  box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
}

.login-box h2 {
  color: #00b4d8;
  font-size: 24px;
  margin-bottom: 15px;
}

.input-field {
  margin-bottom: 15px;
  position: relative;
}

.input-field input {
  width: 100%;
  padding: 10px 15px;
  border-radius: 10px;
  border: 1px solid rgba(128, 128, 128, 0.342) ;
  background-color: #ffffff;
  color: #000000;
  font-size: 14px;
  outline:None ;
  
}
.input-field input:hover{
    box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3)
}
.input-field input::placeholder {
  color: #8d99ae;
}

.forgot-password {
  display: block;
  text-align: left;
  margin: 10px 0 20px;
  font-size: 12px;
  color: #8d99ae;
  text-decoration: none;
}

.forgot-password:hover{
  color: #00b4d8;
}

.SIGNUP-btn {
  width: 30%;
  padding: 10px 15px;
  border-radius: 40px;
  border: 1px solid #00b4d8;
  background-color: #ffffff;
  color:#00b4d8;
  font-size: 16px;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.SIGNUP-btn:hover {
  color:white;
  background-color:  #00b4d8;
  box-shadow: 0px 4px 15px rgb(1, 215, 253)
}



</style>
<script>
    // Add a click listener to prevent form submission (optional)
document.querySelector('form').addEventListener('submit', (event) => {
  event.preventDefault();
  alert('signin in successfully!');
});

        // Function to restrict non-numeric input
        function validatePhoneNumber(event) {
            const key = event.key;
            if (!/[0-9]/.test(key) && key !== 'Backspace') {
                event.preventDefault();  // Prevent non-numeric character
            }
        }
    
</script>
