<style>

.container {
  background-color: #fff;
  width: 760px;
  max-width: 100vw;
  height: 480px;
  position: relative;
  overflow-x: hidden;
  margin-bottom:5%;

.container .forms-container {

}
.container .forms-container .form-control {
  position: absolute;
  width: 100%;
  display: flex;
  justify-content: center;
  flex-direction: column;
  height: 480px;
  transition: all 0.5s ease-in;
}
.container .forms-container .form-control h2 {

}
.container .forms-container .form-control form {
  display: flex;
  flex-direction: column;
  margin: 0px 30px;
}

  margin: 10px 0px;
  border: none;
  padding: 15px;
  background-color: #efefef;
  border-radius: 5px;
}
.container .forms-container .form-control form button {
  border: none;
  padding: 20px;
  margin-top: 5px;
  background-color: rgb(58, 134, 204);
  border-radius: 5px;
  color: #fff;
  cursor: pointer;
}
.container .forms-container .form-control form button:focus {
  outline: none;
}
.container .forms-container .form-control span {
  margin: 10px 0px;
}
.container .forms-container .form-control .socials i {
  margin: 0 5px;
  color: #fff;
  border-radius: 50%;
}
.container .forms-container .form-control .socials .fa-facebook-f {
  padding: 5px 8px;
  background-color: #3b5998;
}
.container .forms-container .form-control .socials .fa-google-plus-g {

}

}

  z-index: 2;
  left: 0%;
}
.container .intros-container {
  position: relative;
  left: 50%;
  width: 50%;
  text-align: center;
}
.container .intros-container .intro-control {

  width: 100%;
  display: flex;
  justify-content: center;
  flex-direction: column;
  height: 480px;

  background: rgb(58, 134, 204);

    height: 40vh;
  }

  }
  .change .forms-container .form-control.signin-form {
    transform: translateX(0%);
  }
  .change .intros-container .intro-control {
    transform: translateX(0%);
  }
}
  </style>
 <script>
    document.querySelector("form").addEventListener("submit", async function (e) {
        e.preventDefault(); // Prevent default form submission

        const phoneNumber = document.getElementById("phoneno").value;
        const passwordHash = document.getElementById("password").value;

        // Basic client-side validation (optional, but good practice)
        if (!phoneNumber || !passwordHash) {
            alert("Please enter both phone number and password.");
            return;
        }

        try {
            // Adjust this URL to match your Node.js backend's actual address and port
            // If your Node.js is on http://localhost:3000, use that.
            // If you set up HTTPS for Node.js, keep https://localhost:5016
            const response = await fetch("http://localhost:3000/api/login", { // <-- Changed port to 3000 for Node.js example
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ phoneNumber, passwordHash }) // Ensure keys match backend expected names
            });

            // Check if the response was successful (status code 2xx)
            if (response.ok) {
                const data = await response.json(); // Assuming backend sends JSON
                // Handle successful login
                alert("Login successful! Message: " + data.message);
                // Redirect to a dashboard or home page after successful login
                window.location.href = "bundles.html"; // Or your dashboard page
            } else {
                // Handle login failure (e.g., wrong credentials)
                const errorData = await response.json(); // Assuming backend sends JSON with error message
                alert("Login failed: " + (errorData.message || "Unknown error"));
            }
        } catch (error) {
            console.error("Network or server error:", error);
            alert("An error occurred during login. Please try again later.");
        }
    });
</script>
